workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Find project directory
        script: |
          ls -la
          echo "Looking for pubspec.yaml..."
          find . -name "pubspec.yaml" -type f
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f | head -1 | xargs dirname)
          echo "Project found at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
      - name: Get Flutter packages
        script: |
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f | head -1 | xargs dirname)
          cd "$PROJECT_DIR"
          flutter pub get
      - name: Build APK
        script: |
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f | head -1 | xargs dirname)
          cd "$PROJECT_DIR"
          flutter build apk --release
    artifacts:
      - "**/build/app/outputs/flutter-apk/*.apk"
